<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StructoX — AI Structural Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'DM Sans',sans-serif;
background:#090907;
color:#170f0f
}

.container{
display:flex;
min-height:100vh
}

.sidebar{
width: 100px;
background:#db9b1b;
border-right:1px solid #e5e5e5;
padding:20px
}

.logo{
font-weight:700;
font-size:18px;
margin-bottom:30px
}

.nav button{
display:block;
width:100%;
padding:10px;
border:none;
background:none;
text-align:left;
font-size:14px;
margin-bottom:6px;
border-radius:8px;
cursor:pointer
}

.nav button:hover{
background:#f3f3f3
}

.main{
flex:1;
display:flex;
flex-direction:column
}

.topbar{
height:60px;
background:#000;
border-bottom:1px solid #222;
display:flex;
align-items:center;
padding:0 25px;
gap:10px
}

.search{
padding:8px 12px;
border:1px solid #444;
border-radius:8px;
width:450px;
background:#111;
color:#fff
}

.content{
padding:30px
}

.card{
background:#fff;
border:1px solid #e5e5e5;
border-radius:14px;
padding:30px
}

.upload-box{
border:2px dashed #ccc;
border-radius:14px;
padding:40px;
text-align:center;
cursor:pointer
}

.upload-box:hover{
border-color:#e76f3b
}

.btn{
background:#e76f3b;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px
}

.preview{
margin-top:20px;
max-width:250px
}

.status{
margin-top:15px;
font-size:14px;
color:#666
}

.mic-btn{
display:flex;
align-items:center;
justify-content:center;
background:#e76f3b;
color:white;
border:none;
border-radius:8px;
padding:8px 12px;
cursor:pointer;
font-size:16px
}

.table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

.table th,.table td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px
}

.tag{
font-size:11px;
background:#f0fdf4;
color:#15803d;
padding:2px 8px;
border-radius:6px
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div class="logo">StructoX</div>

<div class="nav">
<button>Dashboard</button>
<button>Upload Plan</button>
<button>3D Model</button>
<button>Materials</button>
<button>Report</button>
</div>
</div>

<div class="main">

<div class="topbar">
<input class="search" placeholder="Search plans...">
<button class="mic-btn" onclick="startVoice()">
<i class="fa-solid fa-microphone"></i>
</button>
</div>

<div class="content">

<div class="card">

<h2>Upload Floor Plan</h2>
<p>Upload an image of the architectural plan.</p>

<div class="upload-box" id="drop">

<p>Drag & Drop Image or Click</p>

<input type="file" id="file" accept="image/*" hidden>

<button class="btn" onclick="document.getElementById('file').click()">
Choose File
</button>

<img id="preview" class="preview"/>

<div id="status" class="status"></div>

</div>
</div>

<div class="card" style="margin-top:20px">

<h3>Material Recommendations</h3>

<table class="table">

<thead>
<tr>
<th>Component</th>
<th>Material</th>
<th>Cost</th>
<th>Tag</th>
</tr>
</thead>

<tbody>

<tr>
<td>Load Bearing Wall</td>
<td>Red Brick</td>
<td>₹280/sq.ft</td>
<td><span class="tag">Best Value</span></td>
</tr>

<tr>
<td>Partition Wall</td>
<td>AAC Blocks</td>
<td>₹210/sq.ft</td>
<td><span class="tag">Lightweight</span></td>
</tr>

<tr>
<td>Floor Slab</td>
<td>RCC</td>
<td>₹420/sq.ft</td>
<td><span class="tag">Strong</span></td>
</tr>

</tbody>
</table>
</div>

</div>
</div>
</div>

<script>

const fileInput=document.getElementById('file')
const preview=document.getElementById('preview')
const status=document.getElementById('status')
const drop=document.getElementById('drop')

fileInput.addEventListener('change',()=>{
const file=fileInput.files[0]

if(!file)return

preview.src=URL.createObjectURL(file)

status.innerText="Running analysis..."

setTimeout(()=>{
status.innerText="Analysis Complete"
},3000)

})

drop.addEventListener('dragover',e=>{
e.preventDefault()
drop.style.borderColor="#e76f3b"
})

drop.addEventListener('dragleave',()=>{
drop.style.borderColor="#ccc"
})

drop.addEventListener('drop',e=>{
e.preventDefault()

const file=e.dataTransfer.files[0]

fileInput.files=e.dataTransfer.files

preview.src=URL.createObjectURL(file)

status.innerText="Running analysis..."

setTimeout(()=>{
status.innerText="Analysis Complete"
},3000)

})

let recognition=null
let listening=false

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Voice recognition not supported in this browser")
return
}

if(!recognition){

recognition=new SpeechRecognition()

recognition.lang="en-US"
recognition.interimResults=false
recognition.maxAlternatives=1

recognition.onresult=function(event){

const text=event.results[0][0].transcript

document.querySelector(".search").value=text

}

recognition.onend=function(){

listening=false
document.querySelector(".mic-btn").style.background="#e76f3b"

}

recognition.onerror=function(){

listening=false
document.querySelector(".mic-btn").style.background="#e76f3b"

}

}

const micBtn=document.querySelector(".mic-btn")

if(listening){

recognition.stop()
listening=false
micBtn.style.background="#e76f3b"
return

}

recognition.start()
listening=true

micBtn.style.background="#ff3b30"

}

</script>

</body>
</html>
